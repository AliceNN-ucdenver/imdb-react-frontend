# Implementation Provenance Gate
# Auto-generated by The Red Queen — do not edit manually
# Verifies every implementation PR carries a signed, governed audit chain.

name: Implementation Provenance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  impl-provenance:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'copilot/okr')
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify implementation audit chain (Knight's Seal)
        id: chain
        run: |
          set -uo pipefail
          EVENTS=$(ls .maintainability/audit/events/IMPL-*.jsonl 2>/dev/null | head -1 || true)
          if [ -z "$EVENTS" ]; then
            echo "chain_ok=false" >> "$GITHUB_OUTPUT"
            echo "events_file=" >> "$GITHUB_OUTPUT"
            echo "chain_reason=No .maintainability/audit/events/IMPL-*.jsonl committed — the impl agent never shelled the signed runner, so no governed skill ran." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "events_file=$EVENTS" >> "$GITHUB_OUTPUT"
          RESULT=$(cat "$EVENTS" | npx -y @maintainabilityai/research-runner@~0.1.42 skill-audit-verify-chain 2>&1 || true)
          printf '%s' "$RESULT" > /tmp/impl-chain-verify.json
          OK=$(node -e "try{const r=JSON.parse(require('fs').readFileSync('/tmp/impl-chain-verify.json','utf8'));process.stdout.write(String(r.ok===true))}catch(e){process.stdout.write('false')}")
          echo "chain_ok=$OK" >> "$GITHUB_OUTPUT"
          if [ "$OK" != "true" ]; then
            REASON=$(node -e "try{const r=JSON.parse(require('fs').readFileSync('/tmp/impl-chain-verify.json','utf8'));process.stdout.write(String(r.reason||'chain verification failed'))}catch(e){process.stdout.write('chain-verify output unparseable')}")
            echo "chain_reason=$REASON" >> "$GITHUB_OUTPUT"
          else
            echo "chain_reason=verified" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify required skill_call manifest
        id: manifest
        if: steps.chain.outputs.chain_ok == 'true'
        env:
          JSONL: ${{ steps.chain.outputs.events_file }}
        run: |
          python3 <<'PYEOF'
          import json, os
          jsonl = os.environ['JSONL']
          counts = {}
          with open(jsonl, 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line: continue
                  try:
                      e = json.loads(line)
                  except Exception:
                      continue
                  if e.get('event_kind') != 'skill_call': continue
                  payload = e.get('payload') or {}
                  if payload.get('ok') is False: continue
                  skill = payload.get('skill')
                  if not skill: continue
                  counts[skill] = counts.get(skill, 0) + 1
          required = ['knowledge-code', 'self-review-impl-architect', 'self-review-impl-security']
          missing = [r for r in required if counts.get(r, 0) < 1]
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as gh:
              gh.write('manifest_ok=' + ('true' if not missing else 'false') + '\n')
              gh.write('manifest_missing=' + (','.join(missing) if missing else 'none') + '\n')
          print('skill_call counts:', counts)
          print('missing required:', missing)
          PYEOF

      - name: Verify Hatter Tag continuation
        id: hatter
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const hasBlock = body.includes('implementation_chain:');
            const m = body.match(/chain_root_hash:\s*([^\s]+)/);
            const root = m ? m[1] : '';
            const ok = hasBlock && root && root !== 'PENDING_WRITE_APPROVAL';
            core.setOutput('hatter_ok', ok ? 'true' : 'false');
            core.setOutput('hatter_reason', ok ? 'present' : (hasBlock ? 'chain_root_hash missing or PENDING_WRITE_APPROVAL' : 'no implementation_chain block in PR body'));

      - name: Summarize Red Queen decision log
        id: redqueen
        if: always()
        env:
          EVENTS_FILE: ${{ steps.chain.outputs.events_file }}
        run: |
          python3 <<'PYEOF'
          # Tier 2.5a — SIGNED-PREFIX SEAL verification.
          # The Red Queen log is a live append-only sidecar; the hook fires
          # on the agent's OWN final git add/commit, so a whole-file digest
          # taken at sign time can never match the committed file. The runner
          # therefore seals a PREFIX: payload.covered_bytes + covered_sha256.
          # This step re-hashes the first covered_bytes of the committed log
          # and compares; anything after is the uncovered TAIL (the agent's
          # post-seal commit-time decisions), reported separately — allow-only
          # tail is benign (a note), deny/override/unknown in the tail blocks.
          # ADVISORY today (does not flip the gate's pass).
          import json, os, hashlib
          EVENTS_FILE = os.environ.get('EVENTS_FILE', '')
          path = '.redqueen/audit-log.jsonl'
          present = os.path.exists(path)
          log_bytes = b''
          if present:
              with open(path, 'rb') as bf:
                  log_bytes = bf.read()
          # Find the sealed redqueen_decisions event in the CHAIN-VERIFIED
          # events file only (Codex r3 finding 1 — no glob).
          digest_present = False
          covered_bytes = None
          covered_sha = None
          if EVENTS_FILE and os.path.exists(EVENTS_FILE):
              try:
                  with open(EVENTS_FILE, 'r', encoding='utf-8') as ef:
                      for line in ef:
                          line = line.strip()
                          if not line: continue
                          try:
                              ev = json.loads(line)
                          except Exception:
                              continue
                          if ev.get('event_kind') != 'redqueen_decisions': continue
                          digest_present = True
                          p = ev.get('payload') or {}
                          covered_bytes = p.get('covered_bytes')
                          covered_sha = p.get('covered_sha256')
              except Exception:
                  pass
          # Verify the sealed prefix: re-hash the first covered_bytes bytes.
          seal_match = False
          tail_bytes = 0
          tail_allowed = tail_other = 0
          if digest_present:
              # honest-zero seal: the runner read NO decision log at sign time
              # and emits the EXACT shape covered_bytes=0 AND covered_sha256=null.
              # A zero-byte prefix is vacuously sealed, so the WHOLE committed
              # log is the uncovered tail. NOTE: test covered_bytes == 0, NOT
              # 'is None' (the runner sends the int 0). And covered_sha MUST be
              # null (exact) — covered_bytes=0 with a non-null sha (incl. an
              # empty string) is MALFORMED and falls through to mismatch, never
              # a benign honest-zero.
              if isinstance(covered_bytes, int) and covered_bytes == 0 and covered_sha is None:
                  seal_match = True
                  tail_bytes = len(log_bytes)
              elif isinstance(covered_bytes, int) and covered_bytes > 0 and covered_sha and covered_bytes <= len(log_bytes):
                  prefix = log_bytes[:covered_bytes]
                  seal_match = (hashlib.sha256(prefix).hexdigest() == covered_sha)
                  tail_bytes = len(log_bytes) - covered_bytes
              else:
                  # covered_bytes missing / None / negative, claims MORE than the
                  # committed log holds, or covered_sha absent — a real mismatch,
                  # never a benign tail. No unconditional-true escape hatch here:
                  # a malformed or forged seal MUST fail to match.
                  seal_match = False
          # Classify the uncovered tail: a plain allow is benign; any deny,
          # OVERRIDE (verdict allow but a deny was bypassed), non-allow, or
          # unparseable line is a flagged tail (advisory — surfaced, not gated
          # unless the pass condition opts in below).
          if seal_match and tail_bytes > 0 and covered_bytes is not None:
              tail = log_bytes[covered_bytes:].decode('utf-8', 'replace')
              for tline in tail.split('\n'):
                  tline = tline.strip()
                  if not tline: continue
                  try:
                      te = json.loads(tline)
                  except Exception:
                      tail_other += 1; continue
                  tp = te.get('payload') or {}
                  tv = tp.get('verdict') or te.get('verdict')
                  to = (tp.get('override') is True) or (te.get('override') is True)
                  if tv == 'allow' and not to: tail_allowed += 1
                  else: tail_other += 1
          # Count allow/deny across the COMMITTED log for the human summary.
          allowed = denied = 0
          if present:
              for line in log_bytes.decode('utf-8', 'replace').split('\n'):
                  line = line.strip()
                  if not line: continue
                  try:
                      e = json.loads(line)
                  except Exception:
                      continue
                  v = ((e.get('payload') or {}).get('verdict')) or e.get('verdict')
                  if v == 'allow': allowed += 1
                  elif v == 'deny': denied += 1
          tail_clean = (tail_other == 0)
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a', encoding='utf-8') as gh:
              gh.write('rq_present=' + ('true' if present else 'false') + '\n')
              gh.write('rq_allowed=' + str(allowed) + '\n')
              gh.write('rq_denied=' + str(denied) + '\n')
              gh.write('rq_digest_present=' + ('true' if digest_present else 'false') + '\n')
              gh.write('rq_seal_match=' + ('true' if seal_match else 'false') + '\n')
              gh.write('rq_tail_count=' + str(tail_allowed + tail_other) + '\n')
              gh.write('rq_tail_allowed=' + str(tail_allowed) + '\n')
              gh.write('rq_tail_other=' + str(tail_other) + '\n')
              gh.write('rq_tail_clean=' + ('true' if tail_clean else 'false') + '\n')
          print('red queen seal: present=%s match=%s allowed=%d denied=%d tail=%d (allow=%d other=%d)' % (digest_present, seal_match, allowed, denied, tail_allowed+tail_other, tail_allowed, tail_other))
          PYEOF

      - name: Post provenance verdict + gate
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const chainOk = '${{ steps.chain.outputs.chain_ok }}' === 'true';
            const manifestOk = '${{ steps.manifest.outputs.manifest_ok }}' === 'true';
            const hatterOk = '${{ steps.hatter.outputs.hatter_ok }}' === 'true';
            const chainReason = `${{ steps.chain.outputs.chain_reason }}`;
            const missing = `${{ steps.manifest.outputs.manifest_missing }}`;
            const hatterReason = `${{ steps.hatter.outputs.hatter_reason }}`;
            // Red Queen signed-prefix seal signals — hoisted above the pass
            // gate so the gate can fail on a seal mismatch.
            const rqDigestPresent = '${{ steps.redqueen.outputs.rq_digest_present }}' === 'true';
            const rqSealMatch = '${{ steps.redqueen.outputs.rq_seal_match }}' === 'true';
            // GATE ON SEAL MISMATCH ONLY (user decision). A signed seal whose
            // committed prefix fails to re-hash means tamper / corruption / wrong
            // bytes — that FAILS the PR. A non-clean TAIL (the agent's own
            // post-seal commit-time decisions) stays advisory: surfaced, not
            // gated. No signed seal present → the seal clause is vacuously true
            // (back-compat with runs that predate the signer).
            const pass = chainOk && manifestOk && hatterOk && (!rqDigestPresent || rqSealMatch);
            const row = (label, ok, detail) => `| ${ok ? '✅' : '❌'} | ${label} | ${detail} |`;
            let bodyMd = `## ${pass ? '✅' : '❌'} Implementation provenance\n\n`;
            bodyMd += '| | Check | Detail |\n|---|---|---|\n';
            bodyMd += row('Signed audit chain', chainOk, chainReason) + '\n';
            bodyMd += row('Skill manifest (knowledge-code + self-review-impl)', manifestOk, manifestOk ? 'all present' : ('missing: ' + missing)) + '\n';
            bodyMd += row('Hatter Tag continuation', hatterOk, hatterReason) + '\n';
            const rqPresent = '${{ steps.redqueen.outputs.rq_present }}' === 'true';
            const rqAllowed = '${{ steps.redqueen.outputs.rq_allowed }}';
            const rqDenied = '${{ steps.redqueen.outputs.rq_denied }}';
            const rqTailCount = parseInt('${{ steps.redqueen.outputs.rq_tail_count }}' || '0', 10);
            const rqTailClean = '${{ steps.redqueen.outputs.rq_tail_clean }}' === 'true';
            // Tier 2.5a SIGNED-PREFIX SEAL (Codex-approved contract). The seal
            // covers the decision-log PREFIX the runner read; the gate re-hashes
            // the first covered_bytes of the committed log. "signed & verified"
            // requires the chain step to have verified the event's signature
            // (chainOk) AND the sealed prefix to match (rqSealMatch). Anything
            // after the seal is the agent's own post-seal commit-time decisions —
            // an UNCOVERED TAIL, named honestly: allow-only is benign, deny/
            // override/unknown in the tail is flagged. GATING: a seal MISMATCH
            // fails the PR (folded into pass above); the tail stays advisory.
            const rqVerified = rqDigestPresent && rqSealMatch && chainOk;
            const tailNote = rqTailCount > 0
              ? (' · ' + rqTailCount + ' post-seal commit decision' + (rqTailCount === 1 ? '' : 's') + (rqTailClean ? ' (allow-only, uncovered)' : ' ⚠ NON-ALLOW IN TAIL'))
              : '';
            const rqDetail = rqVerified
              ? ((rqPresent
                    ? ('signed & verified · ' + rqAllowed + ' decisions sealed' + (rqDenied !== '0' ? (' / ' + rqDenied + ' denied') : ''))
                    : 'signed & verified · no decision log (no governed tool calls captured)') + tailNote)
              : rqDigestPresent
                ? ('seal present · ' + (rqSealMatch ? 'prefix ✓' : 'prefix ✗ MISMATCH (gates — fails the PR)') + (chainOk ? '' : ' · chain unverified') + ' · ' + rqAllowed + ' allowed / ' + rqDenied + ' denied' + tailNote)
                : (rqPresent ? (rqAllowed + ' allowed / ' + rqDenied + ' denied · unsigned (runner upgrade pending)') : 'no .redqueen/audit-log.jsonl committed (advisory — not gated)');
            const rqIcon = !rqDigestPresent ? (rqPresent ? 'ℹ️' : '➖') : (rqVerified ? (rqTailClean ? '✅' : '⚠️') : '❌');
            bodyMd += `| ${rqIcon} | Red Queen enforcement seal (mismatch gates · tail advisory) | ${rqDetail} |\n`;
            bodyMd += '\n---\n🔴 Generated by [The Red Queen](https://maintainability.ai) — implementation provenance gate';
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: bodyMd });
            if (!pass) { const why = (rqDigestPresent && !rqSealMatch) ? 'the Red Queen seal failed to verify — the committed decision-log prefix does not match the signed seal (tamper / corruption / wrong bytes)' : 'the impl run was not governed (signed chain / skill manifest / Hatter Tag incomplete)'; core.setFailed('Implementation provenance failed — see the PR comment. ' + why + '.'); }
